<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartWeb</title>
    <link rel="stylesheet" href="./css/hero.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="icon" type="image/x-icon" href="./img/favicon.svg">
</head>

<body>
    <!-- 360x800 -->
    <header class="header">
        <div class="header-content">
            <a href="./character.html">
                <img src="./img/VectorBack.svg" alt="back">
            </a>
            <div class="header-txt">Создание героя</div>
        </div>
    </header>
    <section class="bodys">
        <div class="name">
            Имя
        </div>
        <div class="input-name">
            <input type="text" placeholder="Label">
            <img src="./img/cancel.svg" alt="cancel">
        </div>
        <div class="characters">

            <div class="title-characters">Характеристики</div>
            <div class="icons">
                <img class="icon-hero" src="./img/wizard.svg" alt="wizard">
                <img class="hearts" src="./img/hearts.svg" alt="hearts">
                <img class="shield" src="./img/AC.svg" alt="shield">
            </div>
            <div class="info">
                <div class="infos">
                    <div class="info-1">
                        <div class="info-hero-1">
                            Сил 16
                        </div>
                        <div class="info-hero-2">
                            Лов 11
                        </div>
                        <div class="info-hero-3">
                            Тел 15
                        </div>
                    </div>
                    <div class="info-2">
                        <div class="info-hero-4">
                            Инт 9
                        </div>
                        <div class="info-hero-5">
                            Муд 13
                        </div>
                        <div class="info-hero-6">
                            Хар 14
                        </div>
                    </div>
                </div>

                <img class="picture" src="./img/picture.svg" alt="picture">
            </div>

        </div>



    </section>
    <footer class="footer">
        <div class="btns">
            <div class="btn">
                <a href="./history.html">Начать приключение</a>
            </div>
        </div>
    </footer>
</body>

</html>
